{{ $src := .Get 0 | strings.TrimPrefix "/" }}
<figure class="project-image">
  <img
    src="{{ $src | relURL }}"
    alt="{{ with .Get 1 }}{{ . }}{{ else }}{{ .Get 0 }}{{ end }}"
    style="width:100%; height:auto; display:block; margin:auto;"
  >
  {{ with .Get 1 }}
    <figcaption class="caption">{{ . }}</figcaption>
  {{ end }}
</figure>
